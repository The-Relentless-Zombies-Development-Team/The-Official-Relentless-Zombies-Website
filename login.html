<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=512">
  <title>Log In - Relentless Zombies</title>
  <meta name="description" content="Log in to the Official Relentless Zombies Website">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;800&family=Lexend:wght@300;600&display=swap');
    html, body { margin: 0; padding: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; }
    *, *::before, *::after { box-sizing: border-box; }
    .auth-page { display: flex; min-height: 100vh; align-items: center; justify-content: center; padding: 24px; }
    .auth-card { background: #111; border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 40px; width: 100%; max-width: 420px; }
    .auth-card h1 { font-family: 'Lexend', sans-serif; font-weight: 300; font-size: 28px; margin: 0 0 8px 0; color: rgb(255, 114, 0); }
    .auth-card p.subtitle { color: #888; font-size: 14px; margin: 0 0 32px 0; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 12px; font-weight: 500; color: #888; margin-bottom: 6px; }
    .form-group label .required { color: rgb(220, 38, 38); margin-left: 2px; }
    .form-group input { width: 100%; padding: 12px 14px; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; background: rgba(187,187,187,0.1); color: #fff; font-size: 14px; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s; }
    .form-group input:focus { border-color: rgb(255, 114, 0); }
    .form-group input::placeholder { color: #666; }
    .auth-btn { width: 100%; padding: 12px; border: none; border-radius: 10px; background: rgb(255, 114, 0); color: #000; font-size: 16px; font-weight: 800; font-family: 'Inter', sans-serif; cursor: pointer; transition: opacity 0.2s; }
    .auth-btn:hover { opacity: 0.85; }
    .auth-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .auth-links { margin-top: 20px; text-align: center; font-size: 13px; color: #888; }
    .auth-links a { color: rgb(255, 114, 0); text-decoration: none; }
    .auth-links a:hover { text-decoration: underline; }
    .auth-error { background: rgba(220, 38, 38, 0.15); border: 1px solid rgba(220, 38, 38, 0.3); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: rgb(255, 100, 100); margin-bottom: 20px; display: none; }
    .auth-success { background: rgba(34, 197, 94, 0.15); border: 1px solid rgba(34, 197, 94, 0.3); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: rgb(34, 197, 94); margin-bottom: 20px; display: none; }
    .back-link { position: fixed; top: 20px; left: 20px; z-index: 10; }
    .back-link a { display: flex; align-items: center; justify-content: center; width: 44px; height: 44px; background: rgba(255,255,255,0.08); border-radius: 8px; transition: background 0.2s; }
    .back-link a:hover { background: rgba(255,255,255,0.15); }
    .back-link svg { stroke: #fff; }
  </style>
</head>
<body>
  <div class="back-link">
    <a href="index.html" aria-label="Go back">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/>
      </svg>
    </a>
  </div>

  <div class="auth-page">
    <div class="auth-card">
      <h1>Welcome back</h1>
      <p class="subtitle">Log in to your account</p>

      <div class="auth-error" id="error-msg"></div>
      <div class="auth-success" id="success-msg"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Email<span class="required">*</span></label>
          <input id="email" name="email" type="email" placeholder="Enter your email..." required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Password<span class="required">*</span></label>
          <input id="password" name="password" type="password" placeholder="Enter your password..." required autocomplete="current-password">
        </div>
        <button type="submit" class="auth-btn" id="login-btn">Log In</button>
      </form>

      <div class="auth-links">
        <p><a href="login/signup.html">Don't have an account? Sign up</a></p>
        <p style="margin-top:8px"><a href="#" id="forgot-link">Forgot password?</a></p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-init.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('login-form')
      const email = document.getElementById('email')
      const password = document.getElementById('password')
      const btn = document.getElementById('login-btn')
      const errorEl = document.getElementById('error-msg')
      const successEl = document.getElementById('success-msg')

      function showError(msg) {
        errorEl.textContent = msg
        errorEl.style.display = 'block'
        successEl.style.display = 'none'
      }

      function showSuccess(msg) {
        successEl.textContent = msg
        successEl.style.display = 'block'
        errorEl.style.display = 'none'
      }

      async function handleForgotPassword(e) {
        e.preventDefault()
        const emailVal = email.value.trim()
        if (!emailVal) {
          showError('Please enter your email address first.')
          return
        }
        try {
          const redirectTo = window.location.origin + '/The-Official-Relentless-Zombies-Website/login/reset-password.html'
          const { error } = await sb.auth.resetPasswordForEmail(emailVal, { redirectTo })
          if (error) throw error
          showSuccess('Password reset email sent! Check your inbox.')
        } catch (err) {
          showError(err.message)
        }
      }

      document.getElementById('forgot-link').addEventListener('click', handleForgotPassword)

      form.addEventListener('submit', async (e) => {
        e.preventDefault()
        errorEl.style.display = 'none'
        successEl.style.display = 'none'
        btn.disabled = true
        btn.textContent = 'Logging in...'

        try {
          await signIn(email.value.trim(), password.value)
          window.location.href = window.location.origin + '/The-Official-Relentless-Zombies-Website/index.html'
        } catch (err) {
          showError(err.message)
          btn.disabled = false
          btn.textContent = 'Log In'
        }
      })
    })
  </script>
</body>
</html>
