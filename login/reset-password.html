<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=512">
  <title>Reset Password - Relentless Zombies</title>
  <meta name="description" content="Reset your password on the Official Relentless Zombies Website">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;800&family=Lexend:wght@300;600&display=swap');
    html, body { margin: 0; padding: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; }
    *, *::before, *::after { box-sizing: border-box; }
    .auth-page { display: flex; min-height: 100vh; align-items: center; justify-content: center; padding: 24px; }
    .auth-card { background: #111; border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 40px; width: 100%; max-width: 420px; }
    .auth-card h1 { font-family: 'Lexend', sans-serif; font-weight: 300; font-size: 28px; margin: 0 0 8px 0; color: rgb(255, 114, 0); }
    .auth-card p.subtitle { color: #888; font-size: 14px; margin: 0 0 32px 0; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 12px; font-weight: 500; color: #888; margin-bottom: 6px; }
    .form-group label .required { color: rgb(220, 38, 38); margin-left: 2px; }
    .form-group input { width: 100%; padding: 12px 14px; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; background: rgba(187,187,187,0.1); color: #fff; font-size: 14px; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s; }
    .form-group input:focus { border-color: rgb(255, 114, 0); }
    .form-group input::placeholder { color: #666; }
    .form-group input.error { border-color: rgb(255, 114, 0); }
    .form-group input.valid { border-color: rgb(19, 120, 38); }
    .pw-reqs { list-style: none; padding: 0; margin: 8px 0 0 0; font-size: 12px; display: block !important; }
    .pw-reqs li { color: #666; padding: 2px 0; transition: color 0.2s; display: list-item !important; }
    .pw-reqs li::before { content: '○'; margin-right: 6px; display: inline-block; width: 12px; text-align: center; }
    .pw-reqs li.met { color: rgb(19, 120, 38) !important; }
    .pw-reqs li.met::before { content: '●'; }
    .pw-reqs li.fail { color: rgb(255, 114, 0) !important; }
    .pw-reqs li.fail::before { content: '○'; }
    .auth-btn { width: 100%; padding: 12px; border: none; border-radius: 10px; background: rgb(255, 114, 0); color: #000; font-size: 16px; font-weight: 800; font-family: 'Inter', sans-serif; cursor: pointer; transition: opacity 0.2s; }
    .auth-btn:hover { opacity: 0.85; }
    .auth-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .auth-links { margin-top: 20px; text-align: center; font-size: 13px; color: #888; }
    .auth-links a { color: rgb(255, 114, 0); text-decoration: none; }
    .auth-links a:hover { text-decoration: underline; }
    .auth-error { background: rgba(220, 38, 38, 0.15); border: 1px solid rgba(220, 38, 38, 0.3); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: rgb(255, 100, 100); margin-bottom: 20px; display: none; }
    .auth-success { background: rgba(34, 197, 94, 0.15); border: 1px solid rgba(34, 197, 94, 0.3); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: rgb(34, 197, 94); margin-bottom: 20px; display: none; }
    .validating { text-align: center; padding: 20px 0; color: #888; font-size: 14px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h1>Reset password</h1>
      <p class="subtitle">Enter your new password</p>

      <div class="auth-error" id="error-msg"></div>
      <div class="auth-success" id="success-msg"></div>

      <div class="validating" id="validating-msg">Verifying reset link...</div>

      <form id="reset-form" class="hidden">
        <div class="form-group">
          <label for="password">New Password<span class="required">*</span></label>
          <input id="password" name="password" type="password" placeholder="Enter new password..." required autocomplete="new-password" minlength="8">
          <ul class="pw-reqs" id="pw-reqs">
            <li id="req-length">At least 8 characters</li>
            <li id="req-lower">One lowercase letter</li>
            <li id="req-upper">One uppercase letter</li>
            <li id="req-number">One number</li>
            <li id="req-special">One special character</li>
          </ul>
        </div>
        <div class="form-group">
          <label for="confirm-password">Confirm New Password<span class="required">*</span></label>
          <input id="confirm-password" name="confirm-password" type="password" placeholder="Confirm new password..." required autocomplete="new-password">
        </div>
        <button type="submit" class="auth-btn" id="reset-btn">Reset Password</button>
      </form>

      <div class="auth-links">
        <p><a href="../login.html">Back to log in</a></p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-init.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const form = document.getElementById('reset-form')
      const password = document.getElementById('password')
      const confirmPassword = document.getElementById('confirm-password')
      const btn = document.getElementById('reset-btn')
      const errorEl = document.getElementById('error-msg')
      const successEl = document.getElementById('success-msg')
      const validatingEl = document.getElementById('validating-msg')

      const reqs = {
        length: { el: document.getElementById('req-length'), test: v => v.length >= 8 },
        lower: { el: document.getElementById('req-lower'), test: v => /[a-z]/.test(v) },
        upper: { el: document.getElementById('req-upper'), test: v => /[A-Z]/.test(v) },
        number: { el: document.getElementById('req-number'), test: v => /[0-9]/.test(v) },
        special: { el: document.getElementById('req-special'), test: v => /[^a-zA-Z0-9]/.test(v) },
      }

      function validatePassword(val) {
        let allMet = true
        for (const key in reqs) {
          const r = reqs[key]
          const met = r.test(val)
          r.el.className = met ? 'met' : (val.length > 0 ? 'fail' : '')
          if (!met) allMet = false
        }
        password.className = val.length === 0 ? '' : allMet ? 'valid' : 'error'
        return allMet
      }

      password.addEventListener('input', () => validatePassword(password.value))

      function showError(msg) {
        errorEl.textContent = msg
        errorEl.style.display = 'block'
        successEl.style.display = 'none'
      }

      function showSuccess(msg) {
        successEl.textContent = msg
        successEl.style.display = 'block'
        errorEl.style.display = 'none'
      }

      // Parse URL hash for tokens
      const hashParams = new URLSearchParams(window.location.hash.replace('#', ''))
      const accessToken = hashParams.get('access_token')
      const refreshToken = hashParams.get('refresh_token')
      const type = hashParams.get('type')

      if (!accessToken || type !== 'recovery') {
        validatingEl.classList.add('hidden')
        showError('Invalid or expired reset link. Please request a new one.')
        return
      }

      try {
        const { error } = await sb.auth.setSession({ access_token: accessToken, refresh_token: refreshToken })
        if (error) throw error

        validatingEl.classList.add('hidden')
        form.classList.remove('hidden')
      } catch (err) {
        validatingEl.classList.add('hidden')
        showError('Reset link expired or invalid. Please request a new one.')
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault()
        errorEl.style.display = 'none'
        successEl.style.display = 'none'

        if (!validatePassword(password.value)) {
          showError('Password does not meet security requirements.')
          return
        }

        if (password.value !== confirmPassword.value) {
          showError('Passwords do not match.')
          return
        }

        btn.disabled = true
        btn.textContent = 'Resetting...'

        try {
          const { error } = await sb.auth.updateUser({ password: password.value })
          if (error) throw error

          showSuccess('Password reset successfully! Redirecting to login...')
          form.reset()
          setTimeout(() => {
            window.location.href = window.location.origin + siteRoot() + '/login.html'
          }, 2000)
        } catch (err) {
          showError(err.message)
          btn.disabled = false
          btn.textContent = 'Reset Password'
        }
      })
    })
  </script>
</body>
</html>
