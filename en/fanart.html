<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1200">
  <title>Fan Art - Relentless Zombies</title>
  <meta name="description" content="Fan art gallery for the Official Relentless Zombies Website">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;800&family=Lexend:wght@300;600&display=swap');
    html, body { margin: 0; padding: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; }
    *, *::before, *::after { box-sizing: border-box; }
    .gallery-page { min-height: 100vh; padding: 24px; }
    .gallery-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; flex-wrap: wrap; gap: 16px; }
    .gallery-header h1 { font-family: 'Lexend', sans-serif; font-weight: 300; font-size: 36px; margin: 0; color: rgb(255, 114, 0); }
    .gallery-header a { color: #fff; text-decoration: none; font-size: 14px; font-weight: 500; padding: 8px 16px; border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; transition: background 0.2s; }
    .gallery-header a:hover { background: rgba(255,255,255,0.08); }
    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    .gallery-item { position: relative; border-radius: 12px; overflow: hidden; background: #111; aspect-ratio: 1; cursor: pointer; border: 1px solid rgba(255,255,255,0.06); transition: transform 0.2s, border-color 0.2s; }
    .gallery-item:hover { transform: translateY(-2px); border-color: rgba(255,114,0,0.3); }
    .gallery-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .gallery-item .caption { position: absolute; bottom: 0; left: 0; right: 0; padding: 12px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); font-size: 13px; color: #fff; }
    .gallery-item .author { position: absolute; top: 8px; right: 8px; font-size: 11px; color: rgba(255,255,255,0.5); background: rgba(0,0,0,0.6); padding: 4px 8px; border-radius: 4px; }
    .gallery-empty { text-align: center; padding: 80px 20px; color: #666; }
    .gallery-empty h2 { color: #888; font-size: 20px; margin: 0 0 8px 0; }
    .gallery-empty p { font-size: 14px; margin: 0; }
    .upload-area { margin-bottom: 32px; padding: 24px; border: 2px dashed rgba(255,255,255,0.12); border-radius: 12px; text-align: center; display: none; }
    .upload-area.visible { display: block; }
    .upload-area p { margin: 0 0 12px 0; color: #888; font-size: 14px; }
    .upload-btn { display: inline-block; padding: 10px 24px; background: rgb(255, 114, 0); color: #000; border: none; border-radius: 8px; font-size: 14px; font-weight: 800; font-family: 'Inter', sans-serif; cursor: pointer; transition: opacity 0.2s; }
    .upload-btn:hover { opacity: 0.85; }
    .upload-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 40px; cursor: pointer; }
    .modal-overlay.open { display: flex; }
    .modal-content { max-width: 90vw; max-height: 90vh; position: relative; cursor: default; }
    .modal-content img { max-width: 100%; max-height: 85vh; border-radius: 8px; display: block; }
    .modal-content .modal-caption { color: #aaa; font-size: 14px; margin-top: 12px; text-align: center; }
    .modal-close { position: absolute; top: -40px; right: 0; background: none; border: none; color: #fff; font-size: 28px; cursor: pointer; padding: 4px 8px; }
    .loading { text-align: center; padding: 60px 20px; color: #666; font-size: 14px; }
    .nav-link { text-align: center; margin-bottom: 32px; }
    .nav-link a { color: rgba(255,255,255,0.5); text-decoration: none; font-size: 13px; }
    .nav-link a:hover { color: #fff; }
  </style>
</head>
<body>
  <div class="nav-link">
    <a href="index.html">&larr; Back to home</a>
  </div>

  <div class="gallery-page">
    <div class="gallery-header">
      <h1>Fan Art</h1>
      <a href="index.html">Home</a>
    </div>

    <div class="upload-area" id="upload-area">
      <p>Share your fan art with the community!</p>
      <input type="file" accept="image/*" id="upload-input" style="display:none">
      <button class="upload-btn" id="upload-btn">Upload Image</button>
      <p id="upload-status" style="font-size:12px;color:#666;margin-top:8px"></p>
    </div>

    <div id="gallery-grid" class="gallery-grid"></div>
    <div id="gallery-loading" class="loading">Loading fan art...</div>
  </div>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-content">
      <button class="modal-close" id="modal-close">&times;</button>
      <img id="modal-image" src="" alt="">
      <div class="modal-caption" id="modal-caption"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-init.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/fanart.js"></script>
</body>
</html>
